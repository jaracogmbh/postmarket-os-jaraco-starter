name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine pytest

      - name: Build source and wheel distributions
        run: python -m build

      - name: Validate package metadata
        run: python -m twine check dist/*

      - name: Build release tarball
        run: make dist

      - name: Run tests (or smoke check if no tests exist)
        run: |
          if [ -d tests ] && find tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
            pytest -q
          else
            echo "No tests found. Running smoke checks instead."
            test -f pyproject.toml
            test -f setup.py
            test -f README.md
          fi
