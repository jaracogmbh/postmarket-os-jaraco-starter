name: Alpine Package Check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  alpine-package:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Alpine build dependencies
        run: |
          apk add --no-cache bash make tar coreutils python3 py3-setuptools

      - name: Build release tarball
        run: make dist

      - name: Validate APKBUILD shell syntax
        run: sh -n APKBUILD

      - name: Validate package file layout
        run: |
          test -f setup.py
          test -f pyproject.toml
          test -f starter.sample.json
          test -f data/io.jaraco.Starter.desktop
          test -f data/io.jaraco.Starter.metainfo.xml
          test -f data/io.jaraco.Starter.svg
          test -f data/io.jaraco.Starter.policy
          test -f src/jaraco_starter/runner.py

      - name: Verify APKBUILD checksum matches generated tarball
        run: |
          pkgname="$(awk -F= '/^pkgname=/{print $2}' APKBUILD | tr -d '"')"
          pkgver="$(awk -F= '/^pkgver=/{print $2}' APKBUILD | tr -d '"')"
          tarball_name="${pkgname}-${pkgver}.tar.gz"
          tarball="dist/${tarball_name}"
          test -f "$tarball"

          expected="$(sed -n '/^sha512sums="/,/^"$/p' APKBUILD | grep "  ${tarball_name}$" | awk '{print $1}' | head -n 1)"
          actual="$(sha512sum "$tarball" | awk '{print $1}')"

          echo "expected=${expected}"
          echo "actual=${actual}"
          echo "APKBUILD sha512sums block:"
          sed -n '/^sha512sums="/,/^"$/p' APKBUILD
          echo "tarball contents:"
          tar -tvzf "$tarball"
          echo "source file checksums:"
          sha512sum \
            LICENSE \
            Makefile \
            README.md \
            pyproject.toml \
            setup.py \
            starter.sample.json \
            data/io.jaraco.Starter.desktop \
            data/io.jaraco.Starter.metainfo.xml \
            data/io.jaraco.Starter.policy \
            data/io.jaraco.Starter.svg \
            src/jaraco_starter/__init__.py \
            src/jaraco_starter/runner.py \
            tests/test_runner.py

          [ -n "$expected" ]
          [ "$expected" = "$actual" ]
